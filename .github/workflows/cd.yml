name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    uses: ./.github/workflows/reusable-deploy.yml

    with:
      release_name: github-action
      chart_name: github-action-chart
      chart_version: ${{ github.event.workflow_run.run_number }}

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}