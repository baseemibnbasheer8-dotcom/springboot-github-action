name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Login to OCI Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          helm registry login docker.io \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Pull Helm Chart
        run: |
          helm pull \
            oci://docker.io/${{ secrets.DOCKER_USERNAME }}/github-action-chart \
            --version ${{ github.event.workflow_run.run_number }}

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install github-action \
            github-action-${{ github.event.workflow_run.run_number }}.tgz

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
          helm list